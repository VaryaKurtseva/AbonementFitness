spring.main.allow-bean-definition-overriding=true
server.port=8088
spring.application.name=demo-rest

# ?????????? DataSource
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Swagger
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.persistAuthorization=true
springdoc.model-converters.pageable-converter.enabled=false

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# DGS GraphQL ????????? (
dgs.graphql.schema-locations=classpath*:graphql/**/*.graphqls
dgs.graphql.scan-packages=com.example.Abonement_demo_rest.graphql
dgs.graphql.extended-scalars.enabled=true

# GraphiQL
spring.graphql.graphiql.enabled=true
spring.graphql.path=/graphql

# ???????????
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.netflix.graphql.dgs=DEBUG